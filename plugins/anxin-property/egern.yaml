name: "安鑫物业小程序去广告"
description: "Egern 激进模式：原生透明图复写、请求脚本、域名/DoH 拒绝和扩大后的 CDN 网段共同阻断微信广告素材；会误伤部分微信媒体及中国 CDN。"
icon: "shield.lefthalf.filled"

dns:
  hosts:
    "wximg.wxs.qq.com": 0.0.0.0
    "wxsmw.wxs.qq.com": 0.0.0.0
    "wxsnsdy.wxs.qq.com": 0.0.0.0
    "wxsnsdythumb.wxs.qq.com": 0.0.0.0
  forward:
    - domain:
        match: "wximg.wxs.qq.com"
        value: reject
    - domain:
        match: "wxsmw.wxs.qq.com"
        value: reject
    - domain:
        match: "wxsnsdy.wxs.qq.com"
        value: reject
    - domain:
        match: "wxsnsdythumb.wxs.qq.com"
        value: reject
  block_ips:
    - "27.152.0.0/16"
    - "121.204.0.0/16"
    - "124.72.0.0/16"
    - "171.105.0.0/16"
    - "171.108.0.0/16"
    - "220.160.0.0/16"

rules:
  - ip_cidr:
      name: "阻断广告素材 CDN 27.152.0.0/16"
      match: "27.152.0.0/16"
      policy: REJECT
      no_resolve: true
  - ip_cidr:
      name: "阻断广告素材 CDN 121.204.0.0/16"
      match: "121.204.0.0/16"
      policy: REJECT
      no_resolve: true
  - ip_cidr:
      name: "阻断广告素材 CDN 124.72.0.0/16"
      match: "124.72.0.0/16"
      policy: REJECT
      no_resolve: true
  - ip_cidr:
      name: "阻断广告素材 CDN 171.105.0.0/16"
      match: "171.105.0.0/16"
      policy: REJECT
      no_resolve: true
  - ip_cidr:
      name: "阻断广告素材 CDN 171.108.0.0/16"
      match: "171.108.0.0/16"
      policy: REJECT
      no_resolve: true
  - ip_cidr:
      name: "阻断广告素材 CDN 220.160.0.0/16"
      match: "220.160.0.0/16"
      policy: REJECT
      no_resolve: true
  - domain:
      name: "阻断微信图片素材主机"
      match: "wximg.wxs.qq.com"
      policy: REJECT
  - domain:
      name: "阻断微信视频素材主机"
      match: "wxsmw.wxs.qq.com"
      policy: REJECT
  - domain:
      name: "阻断微信动态素材主机"
      match: "wxsnsdy.wxs.qq.com"
      policy: REJECT
  - domain:
      name: "阻断微信缩略图素材主机"
      match: "wxsnsdythumb.wxs.qq.com"
      policy: REJECT
  - domain:
      name: "阻断阿里公共 DoH"
      match: "dns.alidns.com"
      policy: REJECT
  - domain:
      name: "阻断腾讯公共 DoH"
      match: "doh.pub"
      policy: REJECT
  - url_regex:
      name: "阻断微信素材主机 DoH 查询"
      match: '^https://(?:dns\.alidns\.com|doh\.pub)/dns-query\?dns=[A-Za-z0-9_-]*(?:BXd4aW1nA3d4cwJxcQNjb20A|BXd4c213A3d4cwJxcQNjb20A|B3d4c25zZHkDd3hzAnFxA2NvbQA|DHd4c25zZHl0aHVtYgN3eHMCcXEDY29tAA)'
      policy: REJECT
  - url_regex:
      name: "拦截微信广告视频及封面"
      match: '^https://(?:wxsmw|wxsnsdy|wxsnsdythumb|wximg)\.wxs\.qq\.com/(?:[^/?#]+/)*snssvpdownload/SH/reserved/ads_svp_video__'
      policy: REJECT
  - url_regex:
      name: "拦截微信广告静态创意"
      match: '^https://(?:wxsnsdythumb|wximg)\.wxs\.qq\.com/(?:[^/?#]+/)*snscosdownload/(?:[^/?#]+/)*reserved/[^/?#]*0000008d00004eec'
      policy: REJECT

url_rewrites:
  - match: '^https://(?:wxsmw|wxsnsdy|wxsnsdythumb|wximg)\.wxs\.qq\.com(?:[/:?#]|$)'
    location: "http://reject-img/"
  - match: '^https://(?:dns\.alidns\.com|doh\.pub)/dns-query(?:[/?#]|$)'
    location: "http://reject-200/"

scriptings:
  - http_request:
      name: "安鑫物业广告本地响应"
      match: '^https://(?:wxsmw|wxsnsdy|wxsnsdythumb|wximg)\.wxs\.qq\.com(?:[/:?#]|$)'
      script_url: "https://raw.githubusercontent.com/zenwinhow/anti-advertise/main/plugins/anxin-property/scripts/egern-request.js"
      timeout: 5

mitm:
  hostnames:
    - "wxsmw.wxs.qq.com"
    - "wxsnsdy.wxs.qq.com"
    - "wxsnsdythumb.wxs.qq.com"
    - "wximg.wxs.qq.com"
    - "dns.alidns.com"
    - "doh.pub"
