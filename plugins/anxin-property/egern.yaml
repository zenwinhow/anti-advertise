name: "安鑫物业小程序去广告"
description: "按抓包路径精确拦截安鑫物业小程序中的微信广告视频、封面和静态创意，不阻断共享素材主机的其他内容。"
icon: "shield.lefthalf.filled"

rules:
  - url_regex:
      name: "拦截微信广告视频及封面"
      match: '^https://(?:wxsmw|wxsnsdy|wxsnsdythumb|wximg)\.wxs\.qq\.com/(?:[^/?#]+/)*snssvpdownload/SH/reserved/ads_svp_video__'
      policy: REJECT
  - url_regex:
      name: "拦截微信广告静态创意"
      match: '^https://(?:wxsnsdythumb|wximg)\.wxs\.qq\.com/(?:[^/?#]+/)*snscosdownload/(?:[^/?#]+/)*reserved/[^/?#]*0000008d00004eec'
      policy: REJECT

url_rewrites:
  - match: '^https://(?:wxsmw|wxsnsdy|wxsnsdythumb|wximg)\.wxs\.qq\.com/(?:[^/?#]+/)*snssvpdownload/SH/reserved/ads_svp_video__[^?#]*\.mp4(?:[?#]|$)'
    location: "http://reject-video/"
  - match: '^https://(?:wxsmw|wxsnsdy|wxsnsdythumb|wximg)\.wxs\.qq\.com/(?:[^/?#]+/)*snssvpdownload/SH/reserved/ads_svp_video__[^?#]*\.(?:jpe?g|png|webp)(?:[?#]|$)'
    location: "http://reject-img/"
  - match: '^https://(?:wxsnsdythumb|wximg)\.wxs\.qq\.com/(?:[^/?#]+/)*snscosdownload/(?:[^/?#]+/)*reserved/[^/?#]*0000008d00004eec[^/?#]*(?:[?#]|$)'
    location: "http://reject-img/"

scriptings:
  - http_request:
      name: "安鑫物业广告本地响应"
      match: '^https://(?:wxsmw|wxsnsdy|wxsnsdythumb|wximg)\.wxs\.qq\.com/(?:[^/?#]+/)*(?:snssvpdownload/SH/reserved/ads_svp_video__|snscosdownload/(?:[^/?#]+/)*reserved/[^/?#]*0000008d00004eec)'
      script_url: "https://raw.githubusercontent.com/zenwinhow/anti-advertise/main/plugins/anxin-property/scripts/egern-request.js"
      timeout: 5

mitm:
  hostnames:
    - "wxsmw.wxs.qq.com"
    - "wxsnsdy.wxs.qq.com"
    - "wxsnsdythumb.wxs.qq.com"
    - "wximg.wxs.qq.com"
