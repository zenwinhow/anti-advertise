name: "安鑫物业小程序去广告"
description: "激进模式：域名级阻断微信广告素材 CDN，并保留 URL 规则作为第二层防线；可能误伤其他微信小程序媒体。"
icon: "shield.lefthalf.filled"

rules:
  - domain:
      name: "阻断微信图片素材主机"
      match: "wximg.wxs.qq.com"
      policy: REJECT
  - domain:
      name: "阻断微信视频素材主机"
      match: "wxsmw.wxs.qq.com"
      policy: REJECT
  - domain:
      name: "阻断微信动态素材主机"
      match: "wxsnsdy.wxs.qq.com"
      policy: REJECT
  - domain:
      name: "阻断微信缩略图素材主机"
      match: "wxsnsdythumb.wxs.qq.com"
      policy: REJECT
  - url_regex:
      name: "拦截微信广告视频及封面"
      match: '^https://(?:wxsmw|wxsnsdy|wxsnsdythumb|wximg)\.wxs\.qq\.com/(?:[^/?#]+/)*snssvpdownload/SH/reserved/ads_svp_video__'
      policy: REJECT
  - url_regex:
      name: "拦截微信广告静态创意"
      match: '^https://(?:wxsnsdythumb|wximg)\.wxs\.qq\.com/(?:[^/?#]+/)*snscosdownload/(?:[^/?#]+/)*reserved/[^/?#]*0000008d00004eec'
      policy: REJECT

mitm:
  hostnames:
    - "wxsmw.wxs.qq.com"
    - "wxsnsdy.wxs.qq.com"
    - "wxsnsdythumb.wxs.qq.com"
    - "wximg.wxs.qq.com"
