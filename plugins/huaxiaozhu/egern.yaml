name: "花小猪去广告"
description: "拦截花小猪广告域名，并预防性清空活动批量接口；活动接口规则需要 MITM。"
icon: "shield.lefthalf.filled"

rules:
  - domain:
      name: "拦截花小猪广告追踪"
      match: "adtrack.hongyibo.com.cn"
      policy: REJECT
  - domain:
      name: "拦截花小猪广告日志"
      match: "guanggao-prod.cn-shanghai.log.aliyuncs.com"
      policy: REJECT
  - domain:
      name: "拦截第三方广告投放接口"
      match: "open-set-api.shenshiads.com"
      policy: REJECT
  - domain:
      name: "拦截广点通广告 SDK"
      match: "sdk.e.qq.com"
      policy: REJECT
  - domain:
      name: "拦截广点通广告接口"
      match: "mi.gdt.qq.com"
      policy: REJECT

url_rewrites:
  - match: '^https://res\.hongyibo\.com\.cn/os/gs/resapi/activity/mget\?_t'
    location: "http://reject-dict/"

mitm:
  hostnames:
    - "res.hongyibo.com.cn"
