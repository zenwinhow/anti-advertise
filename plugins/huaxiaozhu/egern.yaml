name: "花小猪去广告"
description: "拦截花小猪广告域名，并预防性清空活动批量接口；内置花小猪相关精确 MITM 主机。"
icon: "shield.lefthalf.filled"

rules:
  - domain:
      name: "拦截花小猪广告追踪"
      match: "adtrack.hongyibo.com.cn"
      policy: REJECT
  - domain:
      name: "拦截花小猪广告日志"
      match: "guanggao-prod.cn-shanghai.log.aliyuncs.com"
      policy: REJECT
  - domain:
      name: "拦截第三方广告投放接口"
      match: "open-set-api.shenshiads.com"
      policy: REJECT
  - domain:
      name: "拦截广点通广告 SDK"
      match: "sdk.e.qq.com"
      policy: REJECT
  - domain:
      name: "拦截广点通广告接口"
      match: "mi.gdt.qq.com"
      policy: REJECT

url_rewrites:
  - match: '^https://res\.hongyibo\.com\.cn/os/gs/resapi/activity/mget\?_t'
    location: "http://reject-dict/"
  - match: '^https://res-new\.hongyibo\.com\.cn/resapi/activity/(?:mget|render)(?:[?#]|$)'
    location: "http://reject-dict/"

scriptings:
  - http_response:
      name: "花小猪首页广告卡片过滤"
      match: '^https://casper-agent\.hongyibo\.com\.cn/agent/v3/(?:feeds|preview)(?:[?#]|$)'
      script_url: "https://raw.githubusercontent.com/zenwinhow/anti-advertise/main/plugins/huaxiaozhu/scripts/egern-feed-filter.js"
      body_required: true
      max_size: 524288
      timeout: 5

mitm:
  hostnames:
    - "adtrack.hongyibo.com.cn"
    - "api.hongyibo.com.cn"
    - "as.hongyibo.com.cn"
    - "casper-agent.hongyibo.com.cn"
    - "catchdata.hongyibo.com.cn"
    - "common.hongyibo.com.cn"
    - "conf.hongyibo.com.cn"
    - "epassport.hongyibo.com.cn"
    - "gift-static.hongyibo.com.cn"
    - "gwp.hongyibo.com.cn"
    - "httpdns.hongyibo.com.cn"
    - "lion.hongyibo.com.cn"
    - "map-api.hongyibo.com.cn"
    - "map-poi.hongyibo.com.cn"
    - "map-trafficrenderapi.hongyibo.com.cn"
    - "msggate.hongyibo.com.cn"
    - "omgup.hongyibo.com.cn"
    - "page.hongyibo.com.cn"
    - "res.hongyibo.com.cn"
    - "res-new.hongyibo.com.cn"
    - "s3-pypu.hongyibo.com.cn"
    - "s3-static.hongyibo.com.cn"
    - "sec-guard.hongyibo.com.cn"
    - "static.hongyibo.com.cn"
    - "guanggao-prod.cn-shanghai.log.aliyuncs.com"
    - "open-set-api.shenshiads.com"
    - "security.honghusaas.com"
